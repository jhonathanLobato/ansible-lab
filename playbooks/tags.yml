- name: Testando TAG
  hosts: all
  tasks:
    - name: SISOP | Set a hostname
      ansible.builtin.hostname:
        name: srv01
        use: systemd
      tags:

    - name: SISOP | Disable SELINUX
      ansible.builtin.selinux: state=disabled

    - name: COPY | Copy ansible.cfg
      ansible.builtin.copy:
        src: ../ansible.cfg
        dest: /tmp/ansible.cfg
        owner: root
        group: root
        mode: 0644