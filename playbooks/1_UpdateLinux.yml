- name: Update Ubuntu Linux Servers
  hosts: ubuntu01
  tasks:
    - name: APT | Update System   # Nome do modulo e a descrição da tarefa
      ansible.builtin.apt:
        name: "*"
        state: latest
        update_cache: yes

