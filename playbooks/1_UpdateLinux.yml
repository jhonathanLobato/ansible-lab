# Rodando o playbook
# ansible-playbook [argumentos] [playbook.yml]
# -h para mostrar os argumentos
# -i para informar o inventário
# -u para informar o usuário
# --syntax-check para verificar a sintaxe do playbook
# --list-hosts para listar os hosts que serão afetados
# --list-tasks para listar as tarefas que serão executadas